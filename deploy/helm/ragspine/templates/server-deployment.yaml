# HTTP 服务（FastAPI + uvicorn）——对应 compose 的 app。command 硬编码 --host 0.0.0.0：
# 容器内必须对外可达（scripts/run_server.py 默认 127.0.0.1 不可达）。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ragspine.fullname" . }}-server
  labels:
    {{- include "ragspine.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  replicas: {{ .Values.server.replicaCount }}
  selector:
    matchLabels:
      {{- include "ragspine.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        {{- include "ragspine.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: server
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # server 角色：显式 --host 0.0.0.0 对外可达。
          command: ["python", "scripts/run_server.py", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            {{- include "ragspine.envFrom" . | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: data
              mountPath: /var/lib/ragspine
          {{- with .Values.server.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "ragspine.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
