{{- if .Values.ingress.enabled }}
# 可选 Ingress（默认关闭）——把 server Service 暴露到集群外的 host。
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "ragspine.fullname" . }}
  labels:
    {{- include "ragspine.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "ragspine.fullname" . }}
                port:
                  number: {{ .Values.server.service.port }}
{{- end }}
