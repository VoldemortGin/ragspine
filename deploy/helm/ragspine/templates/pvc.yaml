{{- if .Values.persistence.enabled }}
# 共享数据 PVC：挂在 server + worker 的 /var/lib/ragspine（sqlite 库 + 上传目录）。
# 对应 compose 的命名卷 ragspine-data。ReadWriteOnce 时两 pod 须同节点（kind 单节点满足）。
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "ragspine.fullname" . }}-data
  labels:
    {{- include "ragspine.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.persistence.accessMode }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass | quote }}
  {{- end }}
{{- end }}
