{{- if include "ragspine.hasSecrets" . }}
# 机密（API key）——仅当 values 里填了任一 key 才渲染。作为 env 注入容器，由对应 SDK 自行读取。
# 这些是 *_API_KEY（非 RAGSPINE_* 旋钮），故放 Secret 而非上面的非机密 ConfigMap。
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ragspine.secretName" . }}
  labels:
    {{- include "ragspine.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secrets.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.openaiApiKey }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  {{- end }}
{{- end }}
