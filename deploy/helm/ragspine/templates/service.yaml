# ClusterIP Service：把 server pod 的 8000 端口暴露为集群内 <fullname>:port。
# selector 只选 server 组件（worker 无端口、不入此 Service）。
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ragspine.fullname" . }}
  labels:
    {{- include "ragspine.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.server.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "ragspine.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: server
