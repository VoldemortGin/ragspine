# Production overlay: use the immutable GHCR release image instead of building locally.
#
# Usage from the repository root:
#   RAGSPINE_TAG=0.11.0 docker compose \
#     -f deploy/compose.yaml -f deploy/compose.prod.yaml up -d
#
# RAGSPINE_TAG is required deliberately: production must not drift on `latest`.
services:
  app:
    build: null
    image: ghcr.io/voldemortgin/ragspine:${RAGSPINE_TAG:?set RAGSPINE_TAG to a released version}
    pull_policy: always

  worker:
    build: null
    image: ghcr.io/voldemortgin/ragspine:${RAGSPINE_TAG:?set RAGSPINE_TAG to a released version}
    pull_policy: always
