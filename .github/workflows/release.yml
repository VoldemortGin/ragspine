# Release → PyPI via Trusted Publishing (OIDC — NO stored token / secret).
#
# Trigger: publishing a GitHub Release. The `gate` job runs the exact same checks as
# `scripts/ci.sh` across the support matrix; only if every leg is green does `publish`
# build + upload BOTH distribution names — canonical `ragspine` + alias `rag-spine`.
#
# ── One-time PyPI setup (web UI, per project) ──────────────────────────────────────────
# https://pypi.org/manage/account/publishing/  →  "Add a new pending publisher":
#   Project name: ragspine    Owner: VoldemortGin   Repository: ragspine
#   Workflow name: release.yml    Environment: (leave blank)
#   …then repeat with Project name: rag-spine  (same Owner / Repository / Workflow).
# "Pending publisher" is used because neither project exists yet; the first successful
# run creates them. After that they show up as normal trusted publishers.
#
# ── To cut a release ───────────────────────────────────────────────────────────────────
# Bump `version` in pyproject.toml (and packaging/rag-spine-alias/pyproject.toml to match),
# commit, then publish a GitHub Release tagged e.g. v0.1.0. The published version is taken
# from pyproject, not the tag — keep them in sync.
name: Release

on:
  release:
    types: [published]

jobs:
  gate:
    strategy:
      fail-fast: true
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install (dev + service + pdf)
        run: |
          python -m pip install -U pip
          pip install -e ".[dev,service,pdf]"
      - name: Gate (scripts/ci.sh)
        run: bash scripts/ci.sh
        env:
          PYTHON: python

  publish:
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC — required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build sdist + wheel (canonical + alias)
        run: |
          python -m pip install -U build
          python -m build --outdir dist-main .
          python -m build --outdir dist-alias packaging/rag-spine-alias
      # Two publish steps: Trusted Publishing mints a project-scoped token per call, so each
      # distribution name is uploaded from its own directory against its own trusted publisher.
      - name: Publish ragspine (canonical)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-main
      - name: Publish rag-spine (alias)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-alias
